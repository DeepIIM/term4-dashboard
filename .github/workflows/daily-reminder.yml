name: Daily Course Reminder

on:
  schedule:
    # Target: send at ~21:00 IST the day before classes.
    # GitHub Actions scheduled runs are queued and can be delayed at busy times,
    # especially on the hour. We schedule ~80 minutes earlier (19:43 IST / 14:13 UTC)
    # using an off-peak minute to reduce queue delays.
    # For exact 21:00 IST timing, use the free local scheduler guide in README.md.
    - cron: '13 14 * * *'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install resend requests
      
      - name: Send reminder email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          COURSES_JSON: ${{ secrets.COURSES_JSON }}
        run: python scripts/send_reminder.py
